services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: shield
      POSTGRES_PASSWORD: shield
      POSTGRES_DB: crypto_shield
    ports:
      - "5432:5432"
    volumes:
      - shield_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - shield_redis_data:/data

volumes:
  shield_postgres_data:
  shield_redis_data:
